<main>
  <div class="form-container">
    <h1 class="form-title"><i class="fas fa-lock"></i> Login to Account</h1>

    <div class="alert alert-error" [class.show]="!!errorMessage">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input
          type="text"
          class="form-control"
          placeholder="Enter username"
          autocomplete="off"
          [(ngModel)]="username"
          name="username"
        >
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input
          type="password"
          class="form-control"
          placeholder="Enter password"
          [(ngModel)]="password"
          name="password"
        >
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>

    <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
      Demo access: any username / any password
    </p>
  </div>
</main>
