<h1>Login</h1>

<form>
  <input 
    type="text" 
    placeholder="Username" 
    [(ngModel)]="username" 
    name="username"
  >

  <br><br>

  <input 
    type="password" 
    placeholder="Password" 
    [(ngModel)]="password" 
    name="password"
  >

  <br><br>

  <button (click)="login()">Login</button>
</form>
