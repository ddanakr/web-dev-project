<h1>{{ subject?.name ?? 'Materials' }}</h1>

@for (m of materials; track m.id) {
  <div style="border: 1px solid gray; padding: 10px; margin: 10px 0;">
    <b>{{ m.title }}</b>
    <div>Rating: {{ m.rating }}</div>
    <div>Downloads: {{ m.downloads }}</div>
    <button type="button" (click)="toggleFavorite(m.id)">
      {{ m.isFavorite ? 'Liked' : 'Like' }}
    </button>
  </div>
}

@if (materials.length === 0) {
  <p>No materials for this subject yet.</p>
}
